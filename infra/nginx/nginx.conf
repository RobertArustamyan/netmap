# Nginx reverse proxy config.
# Routes: / → Next.js :3000, /api/ → FastAPI :8000
#
# Note: this config is for HTTP only (port 80).
# For production TLS, add a server block on port 443 with ssl_certificate directives
# (or put a managed load-balancer in front and rely on X-Forwarded-Proto).

# Number of worker processes; "auto" matches the number of CPU cores.
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Efficient file transfer for static assets
    sendfile on;
    tcp_nopush on;

    # Keep-alive timeout
    keepalive_timeout 65;

    # ---------------------------------------------------------------------------
    # Gzip compression
    # ---------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        image/svg+xml;

    # ---------------------------------------------------------------------------
    # Upstreams
    # Service names match docker-compose service names; Docker DNS resolves them.
    # ---------------------------------------------------------------------------
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    upstream frontend {
        server frontend:3000;
        keepalive 32;
    }

    # ---------------------------------------------------------------------------
    # Main server block — port 80
    # ---------------------------------------------------------------------------
    server {
        listen 80;
        server_name _;   # catch-all; set to your domain in production

        # Raise body size limit for CSV uploads (feature 11)
        client_max_body_size 10m;

        # Shared proxy headers — forward real client info to both upstreams
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering for streaming / SSE responses from FastAPI
        proxy_buffering off;

        # -------------------------------------------------------------------
        # /api/ → FastAPI backend
        # Strip the /api prefix so FastAPI routes are mounted at / internally.
        # e.g. GET /api/v1/contacts → GET /v1/contacts on the backend.
        # -------------------------------------------------------------------
        location /api/ {
            proxy_pass http://backend/;

            # Allow HTTP/1.1 for keep-alive connections to the upstream
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Generous timeout for long-running BFS path-discovery calls
            proxy_read_timeout 60s;
        }

        # -------------------------------------------------------------------
        # / → Next.js frontend
        # -------------------------------------------------------------------
        location / {
            proxy_pass http://frontend;

            proxy_http_version 1.1;
            # WebSocket upgrade support (Next.js HMR in dev uses WS)
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_read_timeout 60s;
        }
    }
}
